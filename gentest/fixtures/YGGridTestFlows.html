<!-- Tests percentage sized tracks when container is indefinite size. -->
<div
  id="grid_indefinite_container_size_percentage_tracks"
  style="
    display: grid;
    grid-template-columns: 40% 50% 100%;
    grid-template-rows: 80px 80%;
  ">
  <div style="width: 100px; height: 100px"></div>
  <div style="width: 100px; height: 100px"></div>
  <div style="padding: 30px"></div>
  <div style="min-width: 40px"></div>
  <div style="border-width: 10px"></div>
</div>

<div
  id="grid_definite_container_size_percentage_tracks"
  style="
    display: grid;
    grid-template-columns: 40% 50% 100%;
    grid-template-rows: 80px 80%;
    width: 300px;
    height: 300px;
    row-gap: 10%;
    column-gap: 20%;
  ">
  <div style="min-width: 40px"></div>
  <div style="border: 40px"></div>
  <div style="padding: 40px"></div>
  <div style="margin: 10%"></div>
</div>
