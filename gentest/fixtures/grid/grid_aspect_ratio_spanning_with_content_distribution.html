<!-- Test case for effective gap consideration during re-resolution (11.1.3)

     Scenario:
     - Grid with 2 auto columns and 2 auto rows
     - Container height: 200px with align-content: space-between
     - Column 1: Two 50x50px items (row heights = 50px each)
     - Column 2: Aspect-ratio 2 item spanning both rows

     With space-between:
     - Row 1: 50px, Row 2: 50px, total = 100px
     - Free space = 200px - 100px = 100px
     - Effective gap = 100px (all free space between rows)

     Spanning item's containing block height:
     - 50px (row 1) + 100px (effective gap) + 50px (row 2) = 200px
     - With aspect-ratio 2, width = 400px

     Without effective gap:
     - 50px + 0 + 50px = 100px -> width = 200px (wrong!)
-->
<div id="grid_aspect_ratio_spanning_with_content_distribution" style="display: grid; grid-template-columns: auto auto; grid-template-rows: auto auto; align-content: space-between; height: 200px; position: absolute;">
  <div style="width: 50px; height: 50px; grid-column-start: 1; grid-column-end: 2; grid-row-start: 1; grid-row-end: 2;"></div>
  <div style="width: 50px; height: 50px; grid-column-start: 1; grid-column-end: 2; grid-row-start: 2; grid-row-end: 3;"></div>
  <div style="aspect-ratio: 2; grid-column-start: 2; grid-column-end: 3; grid-row-start: 1; grid-row-end: 3;"></div>
</div>
